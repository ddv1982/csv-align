[package]
name = "csv-align"
version = "0.1.0"
edition = "2021"
description = "A simple Rust desktop app to compare two CSV files"
license = "MIT"

[dependencies]
eframe = "0.24"
egui = "0.24"
csv = "1.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rfd = "0.12"  # File dialog
strsim = "0.10"  # String similarity for column matching
env_logger = "0.10"

[dev-dependencies]
tempfile = "3.8"

[[bin]]
name = "csv-align"
path = "src/main.rs"

[lib]
name = "csv_align"
path = "src/lib.rs"