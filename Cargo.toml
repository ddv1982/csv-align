[package]
name = "csv-align"
version = "0.2.1"
edition = "2021"
description = "CSV file comparison tool with modern web UI"
license = "MIT"

[dependencies]
# Core dependencies
csv = "1.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
strsim = "0.10"  # String similarity for column matching
env_logger = "0.10"
log = "0.4"

# Web server dependencies
axum = { version = "0.7", features = ["multipart"] }
tokio = { version = "1.0", features = ["full"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "fs"] }
uuid = { version = "1.0", features = ["v4"] }

[dev-dependencies]
tempfile = "3.8"

[[bin]]
name = "csv-align"
path = "src/main.rs"

[lib]
name = "csv_align"
path = "src/lib.rs"
