<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  
  <!-- Central document icon -->
  <g transform="translate(262, 150)">
    <!-- Main document -->
    <rect x="0" y="0" width="500" height="700" rx="30" fill="white" opacity="0.95"/>
    
    <!-- CSV text -->
    <text x="250" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#059669" text-anchor="middle">CSV</text>
    
    <!-- Table rows -->
    <rect x="40" y="120" width="420" height="60" rx="8" fill="#d1fae5"/>
    <rect x="40" y="200" width="420" height="50" rx="6" fill="#f3f4f6"/>
    <rect x="40" y="270" width="420" height="50" rx="6" fill="#f3f4f6"/>
    <rect x="40" y="340" width="420" height="50" rx="6" fill="#f3f4f6"/>
    <rect x="40" y="410" width="420" height="50" rx="6" fill="#f3f4f6"/>
    
    <!-- Grid lines -->
    <line x1="150" y1="120" x2="150" y2="460" stroke="#e5e7eb" stroke-width="3"/>
    <line x1="280" y1="120" x2="280" y2="460" stroke="#e5e7eb" stroke-width="3"/>
    <line x1="380" y1="120" x2="380" y2="460" stroke="#e5e7eb" stroke-width="3"/>
    
    <!-- Match indicator -->
    <circle cx="150" cy="560" r="50" fill="white" opacity="0.9"/>
    <path d="M125 560 L140 575 L175 540" stroke="#10b981" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Diff indicator -->
    <circle cx="350" cy="560" r="50" fill="white" opacity="0.9"/>
    <path d="M325 560 L375 560" stroke="#f59e0b" stroke-width="12" stroke-linecap="round"/>
    <path d="M350 535 L350 585" stroke="#f59e0b" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
