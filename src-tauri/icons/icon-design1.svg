<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  
  <!-- Left CSV icon -->
  <g transform="translate(180, 200)">
    <rect x="0" y="0" width="280" height="620" rx="20" fill="white" opacity="0.95"/>
    <!-- Header row -->
    <rect x="20" y="30" width="240" height="60" rx="8" fill="#dbeafe"/>
    <text x="40" y="70" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1e40af">A</text>
    <!-- Data rows -->
    <rect x="20" y="110" width="240" height="50" rx="6" fill="#f3f4f6"/>
    <rect x="20" y="175" width="240" height="50" rx="6" fill="#f3f4f6"/>
    <rect x="20" y="240" width="240" height="50" rx="6" fill="#f3f4f6"/>
    <rect x="20" y="305" width="240" height="50" rx="6" fill="#f3f4f6"/>
    <!-- Grid lines -->
    <line x1="100" y1="110" x2="100" y2="355" stroke="#e5e7eb" stroke-width="2"/>
    <line x1="180" y1="110" x2="180" y2="355" stroke="#e5e7eb" stroke-width="2"/>
    <!-- Check marks for matches -->
    <circle cx="60" cy="420" r="35" fill="#10b981"/>
    <path d="M45 420 L55 430 L75 405" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="140" cy="420" r="35" fill="#10b981"/>
    <path d="M125 420 L135 430 L155 405" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="220" cy="420" r="35" fill="#f59e0b"/>
    <text x="208" y="430" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">!</text>
    <!-- Arrow -->
    <path d="M250 550 L280 580 L250 610" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>
  
  <!-- Right CSV icon -->
  <g transform="translate(564, 200)">
    <rect x="0" y="0" width="280" height="620" rx="20" fill="white" opacity="0.95"/>
    <!-- Header row -->
    <rect x="20" y="30" width="240" height="60" rx="8" fill="#d1fae5"/>
    <text x="40" y="70" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#059669">B</text>
    <!-- Data rows -->
    <rect x="20" y="110" width="240" height="50" rx="6" fill="#f3f4f6"/>
    <rect x="20" y="175" width="240" height="50" rx="6" fill="#f3f4f6"/>
    <rect x="20" y="240" width="240" height="50" rx="6" fill="#f3f4f6"/>
    <rect x="20" y="305" width="240" height="50" rx="6" fill="#f3f4f6"/>
    <!-- Grid lines -->
    <line x1="100" y1="110" x2="100" y2="355" stroke="#e5e7eb" stroke-width="2"/>
    <line x1="180" y1="110" x2="180" y2="355" stroke="#e5e7eb" stroke-width="2"/>
    <!-- Check marks for matches -->
    <circle cx="60" cy="420" r="35" fill="#10b981"/>
    <path d="M45 420 L55 430 L75 405" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="140" cy="420" r="35" fill="#10b981"/>
    <path d="M125 420 L135 430 L155 405" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="220" cy="420" r="35" fill="#10b981"/>
    <path d="M205 420 L215 430 L235 405" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Comparison arrows in center -->
  <g transform="translate(462, 450)">
    <rect x="0" y="0" width="100" height="120" rx="50" fill="white" opacity="0.2"/>
    <path d="M30 40 L70 60 L30 80" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M70 40 L30 60 L70 80" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
