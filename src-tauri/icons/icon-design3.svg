<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  
  <!-- Two overlapping sheets -->
  <g transform="translate(150, 200)">
    <!-- Back sheet (File A) -->
    <rect x="100" y="50" width="450" height="550" rx="25" fill="white" opacity="0.7" transform="rotate(8, 325, 325)"/>
    
    <!-- Front sheet (File B) -->
    <rect x="100" y="50" width="450" height="550" rx="25" fill="white" opacity="0.95"/>
    
    <!-- Header -->
    <rect x="140" y="90" width="370" height="70" rx="12" fill="#eef2ff"/>
    <text x="325" y="140" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#4f46e5" text-anchor="middle">COMPARE</text>
    
    <!-- Table data -->
    <rect x="140" y="185" width="370" height="45" rx="8" fill="#f3f4f6"/>
    <rect x="140" y="245" width="370" height="45" rx="8" fill="#f3f4f6"/>
    <rect x="140" y="305" width="370" height="45" rx="8" fill="#f3f4f6"/>
    <rect x="140" y="365" width="370" height="45" rx="8" fill="#f3f4f6"/>
    
    <!-- Grid lines -->
    <line x1="230" y1="185" x2="230" y2="410" stroke="#e5e7eb" stroke-width="2"/>
    <line x1="350" y1="185" x2="350" y2="410" stroke="#e5e7eb" stroke-width="2"/>
    
    <!-- Result indicators -->
    <circle cx="200" cy="480" r="40" fill="#10b981"/>
    <path d="M180 480 L195 495 L220 465" stroke="white" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <circle cx="325" cy="480" r="40" fill="#f59e0b"/>
    <text x="313" y="492" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white">≠</text>
    
    <circle cx="450" cy="480" r="40" fill="#ef4444"/>
    <path d="M430 480 L470 480" stroke="white" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
