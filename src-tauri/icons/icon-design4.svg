<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  
  <!-- Simple CSV icon with checkmark -->
  <g transform="translate(212, 162)">
    <!-- Main document -->
    <rect x="0" y="0" width="600" height="700" rx="40" fill="white"/>
    
    <!-- Corner fold -->
    <path d="L480 0 L600 120 L480 120 Z" fill="#e0f2fe"/>
    
    <!-- CSV header -->
    <rect x="60" y="160" width="480" height="70" rx="10" fill="#0ea5e9"/>
    <text x="300" y="210" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">.csv</text>
    
    <!-- Table rows -->
    <rect x="60" y="260" width="200" height="55" rx="8" fill="#f1f5f9"/>
    <rect x="280" y="260" width="260" height="55" rx="8" fill="#f1f5f9"/>
    
    <rect x="60" y="330" width="200" height="55" rx="8" fill="#f1f5f9"/>
    <rect x="280" y="330" width="260" height="55" rx="8" fill="#f1f5f9"/>
    
    <rect x="60" y="400" width="200" height="55" rx="8" fill="#f1f5f9"/>
    <rect x="280" y="400" width="260" height="55" rx="8" fill="#f1f5f9"/>
    
    <!-- Big checkmark -->
    <circle cx="300" cy="580" r="80" fill="#10b981"/>
    <path d="M250 580 L280 610 L350 540" stroke="white" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
