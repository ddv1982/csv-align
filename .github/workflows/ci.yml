name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-22.04
    outputs:
      run_frontend_ci: ${{ steps.filter.outputs.run_frontend_ci }}
      run_full_ci: ${{ steps.filter.outputs.run_full_ci }}
      run_rust_ci: ${{ steps.filter.outputs.run_rust_ci }}
      run_tauri_ci: ${{ steps.filter.outputs.run_tauri_ci }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            run_full_ci:
              - '**'
              - '!**/*.md'
              - '!LICENSE'
            run_rust_ci:
              - '.github/workflows/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'scripts/**'
              - 'src/**'
              - 'tests/**'
            run_frontend_ci:
              - '.github/workflows/**'
              - 'frontend/**'
            run_tauri_ci:
              - '.github/workflows/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'src/**'
              - 'src-tauri/**'
              - 'frontend/**'

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.run_rust_ci == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: rust-${{ runner.os }}-root

      - name: Run Rust tests
        run: cargo test --verbose

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

  validate-release-metadata:
    name: Validate Release Metadata
    needs: changes
    if: needs.changes.outputs.run_full_ci == 'true'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate release metadata
        run: python3 scripts/check_release_metadata.py

  test-frontend:
    name: Test Frontend
    needs: changes
    if: needs.changes.outputs.run_frontend_ci == 'true'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  build-tauri:
    name: Build Tauri
    needs: [changes, test, validate-release-metadata, test-frontend]
    if: |
      always() &&
      needs.changes.outputs.run_tauri_ci == 'true' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.validate-release-metadata.result == 'success' &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    runs-on: ubuntu-22.04
    env:
      TAURI_TARGET: x86_64-unknown-linux-gnu
      RELEASE_ARTIFACT_NAME: csv-align-linux-x86_64-release-bundle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free disk space (Ubuntu)
        run: |
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          echo "Disk usage after cleanup:"
          df -h

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TAURI_TARGET }}

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          key: tauri-build-${{ runner.os }}-${{ env.TAURI_TARGET }}

      - name: Run Tauri wrapper tests
        working-directory: src-tauri
        run: cargo test

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"

      - name: Build Tauri app
        working-directory: src-tauri
        run: |
          rm -rf target/${{ env.TAURI_TARGET }}/release/bundle
          cargo tauri build --target ${{ env.TAURI_TARGET }}

      - name: Upload reusable Tauri bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.RELEASE_ARTIFACT_NAME }}
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 7
