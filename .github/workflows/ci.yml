name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-22.04
    outputs:
      run_frontend_ci: ${{ steps.filter.outputs.run_frontend_ci }}
      run_full_ci: ${{ steps.filter.outputs.run_full_ci }}
      run_rust_ci: ${{ steps.filter.outputs.run_rust_ci }}
      run_tauri_ci: ${{ steps.filter.outputs.run_tauri_ci }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            run_full_ci:
              - '**'
              - '!**/*.md'
              - '!LICENSE'
            run_rust_ci:
              - '.github/workflows/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'scripts/**'
              - 'src/**'
              - 'tests/**'
            run_frontend_ci:
              - '.github/workflows/**'
              - 'frontend/**'
            run_tauri_ci:
              - '.github/workflows/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'scripts/build_frontend_for_tauri.sh'
              - 'src/**'
              - 'src-tauri/**'
              - 'frontend/**'

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.run_rust_ci == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: rust-${{ runner.os }}-root

      - name: Run Rust tests
        run: cargo test --verbose

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

  validate-release-metadata:
    name: Validate Release Metadata
    needs: changes
    if: needs.changes.outputs.run_full_ci == 'true'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate release metadata
        run: python3 scripts/check_release_metadata.py

  test-frontend:
    name: Test Frontend
    needs: changes
    if: needs.changes.outputs.run_frontend_ci == 'true' || needs.changes.outputs.run_tauri_ci == 'true'
    runs-on: ubuntu-22.04
    env:
      FRONTEND_DIST_ARTIFACT_NAME: csv-align-frontend-dist

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        if: needs.changes.outputs.run_frontend_ci == 'true'
        working-directory: frontend
        run: npm test

      - name: Run frontend lint
        if: needs.changes.outputs.run_frontend_ci == 'true'
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate Tauri prebuilt frontend contract
        run: |
          set -euo pipefail

          temp_dir="$(mktemp -d)"
          cleanup() {
            if [ -d "${temp_dir}/dist" ]; then
              rm -rf frontend/dist
              mv "${temp_dir}/dist" frontend/dist
            fi
            rm -rf "${temp_dir}"
          }
          trap cleanup EXIT

          mv frontend/dist "${temp_dir}/dist"
          if CSV_ALIGN_USE_PREBUILT_FRONTEND=1 scripts/build_frontend_for_tauri.sh; then
            echo "Expected prebuilt frontend mode to fail when frontend/dist/index.html is missing." >&2
            exit 1
          fi

          mv "${temp_dir}/dist" frontend/dist
          CSV_ALIGN_USE_PREBUILT_FRONTEND=1 scripts/build_frontend_for_tauri.sh

      - name: Upload frontend dist artifact
        if: needs.changes.outputs.run_tauri_ci == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.FRONTEND_DIST_ARTIFACT_NAME }}
          path: frontend/dist/**
          if-no-files-found: error
          retention-days: 7

  build-tauri:
    name: Build Tauri
    needs: [changes, test, validate-release-metadata, test-frontend]
    if: |
      always() &&
      needs.changes.outputs.run_tauri_ci == 'true' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.validate-release-metadata.result == 'success' &&
      needs.test-frontend.result == 'success'
    runs-on: ubuntu-22.04
    env:
      TAURI_TARGET: x86_64-unknown-linux-gnu
      RELEASE_ARTIFACT_NAME: csv-align-linux-x86_64-release-bundle
      FRONTEND_DIST_ARTIFACT_NAME: csv-align-frontend-dist

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free disk space (Ubuntu)
        run: |
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          echo "Disk usage after cleanup:"
          df -h

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TAURI_TARGET }}

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf appstream desktop-file-utils

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v6
        with:
          name: ${{ env.FRONTEND_DIST_ARTIFACT_NAME }}
          path: frontend/dist

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          key: tauri-build-${{ runner.os }}-${{ env.TAURI_TARGET }}

      - name: Run Tauri wrapper tests
        working-directory: src-tauri
        run: cargo test

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"

      - name: Build Tauri app
        working-directory: src-tauri
        env:
          CSV_ALIGN_USE_PREBUILT_FRONTEND: '1'
        run: |
          rm -rf target/${{ env.TAURI_TARGET }}/release/bundle
          cargo tauri build --target ${{ env.TAURI_TARGET }}

      - name: Validate Debian package metadata
        env:
          DEB_METADATA_REPORT: deb-metadata-report.json
        run: |
          set -euo pipefail

          set +e
          python3 scripts/validate_linux_deb_metadata.py \
            "src-tauri/target/${TAURI_TARGET}/release/bundle/deb/*.deb" \
            --json-report "${DEB_METADATA_REPORT}"
          validator_status=$?
          set -e

          python3 <<'PY'
          import json
          import os
          import pathlib

          report_path = pathlib.Path(os.environ["DEB_METADATA_REPORT"])
          report = json.loads(report_path.read_text(encoding="utf-8"))
          lines = [
              "## Debian package metadata validation",
              "",
              f"Gate: {'PASS' if report['ok'] else 'FAIL'}",
              "",
              "| Package | Component ID | Project license | Desktop ID | Binary |",
              "| --- | --- | --- | --- | --- |",
          ]
          for package in report["packages"]:
              lines.append(
                  "| {package} | {component_id} | {project_license} | {launchable} | {binary} |".format(
                      package=pathlib.Path(package["package"]).name,
                      component_id=package.get("component_id") or "",
                      project_license=package.get("project_license") or "",
                      launchable=package.get("launchable") or "",
                      binary=package.get("binary") or "",
                  )
              )
          lines.extend(["", f"JSON report: `{report_path}`"])
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("\n".join(lines) + "\n")
          PY

          exit "${validator_status}"

      - name: Install Debian signing tools
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-sig gnupg

      - name: Sign Debian packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DEB_SIGNING_PRIVATE_KEY: ${{ secrets.DEB_SIGNING_PRIVATE_KEY }}
          DEB_SIGNING_KEY_FINGERPRINT: ${{ secrets.DEB_SIGNING_KEY_FINGERPRINT }}
          DEB_SIGNING_KEY_PASSPHRASE: ${{ secrets.DEB_SIGNING_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail

          missing=()
          [ -n "${DEB_SIGNING_PRIVATE_KEY}" ] || missing+=("DEB_SIGNING_PRIVATE_KEY")
          [ -n "${DEB_SIGNING_KEY_FINGERPRINT}" ] || missing+=("DEB_SIGNING_KEY_FINGERPRINT")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required Debian signing secrets are missing: ${missing[*]}" >&2
            exit 1
          fi

          deb_dir="src-tauri/target/${TAURI_TARGET}/release/bundle/deb"
          shopt -s nullglob
          deb_packages=("${deb_dir}"/*.deb)

          if [ ${#deb_packages[@]} -eq 0 ]; then
            echo "No Debian packages found in ${deb_dir}." >&2
            exit 1
          fi

          gnupg_home="$(mktemp -d)"
          verification_home="$(mktemp -d)"
          key_file="$(mktemp)"
          passphrase_file=""
          public_key_file=""
          safe_deb_file=""
          cleanup() {
            rm -rf "${gnupg_home}"
            rm -rf "${verification_home}"
            rm -f "${key_file}"
            if [ -n "${passphrase_file}" ]; then
              rm -f "${passphrase_file}"
            fi
            if [ -n "${public_key_file}" ]; then
              rm -f "${public_key_file}"
            fi
            if [ -n "${safe_deb_file}" ]; then
              rm -f "${safe_deb_file}"
            fi
          }
          trap cleanup EXIT

          chmod 700 "${gnupg_home}"
          export GNUPGHOME="${gnupg_home}"
          echo allow-loopback-pinentry > "${GNUPGHOME}/gpg-agent.conf"
          gpgconf --kill gpg-agent || true

          printf '%s' "${DEB_SIGNING_PRIVATE_KEY}" | base64 --decode > "${key_file}"
          gpg --batch --import "${key_file}"

          expected_fingerprint="$(printf '%s' "${DEB_SIGNING_KEY_FINGERPRINT}" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          imported_fingerprint="$(gpg --batch --with-colons --fingerprint "${expected_fingerprint}" | awk -F: '$1 == "fpr" { print toupper($10); exit }')"

          if [ "${imported_fingerprint}" != "${expected_fingerprint}" ]; then
            echo "Imported Debian signing key fingerprint did not match DEB_SIGNING_KEY_FINGERPRINT." >&2
            exit 1
          fi

          gpg_options="--batch --pinentry-mode loopback"
          if [ -n "${DEB_SIGNING_KEY_PASSPHRASE}" ]; then
            passphrase_file="$(mktemp)"
            chmod 600 "${passphrase_file}"
            printf '%s' "${DEB_SIGNING_KEY_PASSPHRASE}" > "${passphrase_file}"
            gpg_options="${gpg_options} --passphrase-file ${passphrase_file}"
          else
            echo "DEB_SIGNING_KEY_PASSPHRASE is not set; signing will only work for an intentionally unprotected key."
          fi

          public_key_file="$(mktemp)"
          gpg --batch --armor --export "${expected_fingerprint}" > "${public_key_file}"
          chmod 700 "${verification_home}"
          GNUPGHOME="${verification_home}" gpg --batch --import "${public_key_file}"

          for deb in "${deb_packages[@]}"; do
            echo "Signing ${deb}"
            deb_dirname="$(dirname "${deb}")"
            deb_basename="$(basename "${deb}")"
            safe_basename="$(printf '%s' "${deb_basename}" | tr ' ' '_' | tr -cd '[:alnum:]_.-')"
            safe_deb_file="${deb_dirname}/${safe_basename}"
            if [ "${safe_deb_file}" = "${deb}" ] || [ -e "${safe_deb_file}" ]; then
              safe_deb_file="${deb_dirname}/signing-${RANDOM}-${safe_basename}"
            fi
            mv "${deb}" "${safe_deb_file}"
            dpkg-sig -g "${gpg_options}" --sign builder -k "${expected_fingerprint}" "${safe_deb_file}"
            echo "Verifying ${deb}"
            GNUPGHOME="${verification_home}" dpkg-sig --verify-role builder "${safe_deb_file}"
            mv "${safe_deb_file}" "${deb}"
            safe_deb_file=""
          done

      - name: Upload reusable Tauri bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.RELEASE_ARTIFACT_NAME }}
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 7
