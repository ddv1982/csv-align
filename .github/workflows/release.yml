name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-22.04
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract changelog notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 <<'PY'
          import os
          import pathlib
          import re
          import sys

          tag = os.environ["RELEASE_TAG"]
          changelog_path = pathlib.Path("CHANGELOG.md")
          release_notes_path = pathlib.Path("release-notes.md")
          heading_pattern = re.compile(r"^## (?P<tag>v[^\s]+) - \d{4}-\d{2}-\d{2}$")

          if not changelog_path.exists():
              print(
                  "::error title=Missing changelog::CHANGELOG.md was not found in the repository checkout.",
                  file=sys.stderr,
              )
              sys.exit(1)

          section_lines = []
          in_target_section = False

          for raw_line in changelog_path.read_text(encoding="utf-8").splitlines():
              heading_match = heading_pattern.match(raw_line)
              if heading_match:
                  if in_target_section:
                      break
                  in_target_section = heading_match.group("tag") == tag
                  continue

              if in_target_section:
                  section_lines.append(raw_line)

          if not in_target_section:
              print(
                  f"::error title=Missing changelog entry::No CHANGELOG.md section found for tag {tag}. Expected a heading like `## {tag} - YYYY-MM-DD`.",
                  file=sys.stderr,
              )
              sys.exit(1)

          notes = "\n".join(section_lines).strip()
          if not notes:
              print(
                  f"::error title=Empty changelog entry::CHANGELOG.md section for tag {tag} is empty. Add at least one release note bullet under the heading.",
                  file=sys.stderr,
              )
              sys.exit(1)

          release_notes_path.write_text(f"{notes}\n", encoding="utf-8")
          PY

      - name: Check if release already exists
        id: release_exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        id: create_release
        if: steps.release_exists.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: CSV Align ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build Release
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: csv-align-linux-x86_64
            asset_name: csv-align-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: csv-align-macos-arm64
            asset_name: csv-align-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: csv-align-macos-x86_64
            asset_name: csv-align-macos-x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space (Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          echo "Disk usage after cleanup:"
          df -h

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Prepare Apple signing environment
        id: apple_env
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE_SECRET: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY_SECRET: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVIDER_SHORT_NAME_SECRET: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
          KEYCHAIN_PASSWORD_SECRET: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          HAS_CERT=false
          HAS_NOTARIZATION=false
          AUTH_MODE=none

          if [ -n "$APPLE_CERTIFICATE_SECRET" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD_SECRET" ] && [ -n "$KEYCHAIN_PASSWORD_SECRET" ]; then
            {
              echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE_SECRET"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD_SECRET"
              echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD_SECRET"
            } >> "$GITHUB_ENV"
            HAS_CERT=true
          fi

          if [ "$HAS_CERT" = true ] && [ -n "$APPLE_API_ISSUER_SECRET" ] && [ -n "$APPLE_API_KEY_SECRET" ] && [ -n "$APPLE_API_PRIVATE_KEY_SECRET" ]; then
            {
              echo "APPLE_API_ISSUER=$APPLE_API_ISSUER_SECRET"
              echo "APPLE_API_KEY=$APPLE_API_KEY_SECRET"
              echo "APPLE_API_PRIVATE_KEY=$APPLE_API_PRIVATE_KEY_SECRET"
            } >> "$GITHUB_ENV"
            HAS_NOTARIZATION=true
            AUTH_MODE=api_key
          elif [ "$HAS_CERT" = true ] && [ -n "$APPLE_ID_SECRET" ] && [ -n "$APPLE_PASSWORD_SECRET" ] && [ -n "$APPLE_TEAM_ID_SECRET" ]; then
            {
              echo "APPLE_ID=$APPLE_ID_SECRET"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD_SECRET"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET"
            } >> "$GITHUB_ENV"
            if [ -n "$APPLE_PROVIDER_SHORT_NAME_SECRET" ]; then
              echo "APPLE_PROVIDER_SHORT_NAME=$APPLE_PROVIDER_SHORT_NAME_SECRET" >> "$GITHUB_ENV"
            fi
            HAS_NOTARIZATION=true
            AUTH_MODE=apple_id
          fi

          echo "has_cert=$HAS_CERT" >> "$GITHUB_OUTPUT"
          echo "has_notarization=$HAS_NOTARIZATION" >> "$GITHUB_OUTPUT"
          echo "auth_mode=$AUTH_MODE" >> "$GITHUB_OUTPUT"

      - name: Import Apple signing certificate
        if: matrix.os == 'macos-latest' && steps.apple_env.outputs.has_cert == 'true'
        run: |
          python3 <<'PY'
          import base64
          import os
          import pathlib

          pathlib.Path("certificate.p12").write_bytes(
              base64.b64decode(os.environ["APPLE_CERTIFICATE"])
          )
          PY
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain /Library/Keychains/System.keychain /System/Library/Keychains/SystemRootCertificates.keychain
          CERT_ID=$(security find-identity -v -p codesigning | awk -F '"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$CERT_ID" ]; then
            echo "No Developer ID Application signing identity was imported." >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          rm -f certificate.p12

      - name: Prepare App Store Connect API key
        if: matrix.os == 'macos-latest' && steps.apple_env.outputs.auth_mode == 'api_key'
        run: |
          python3 <<'PY'
          import base64
          import os
          import pathlib

          key_path = pathlib.Path(f"AuthKey_{os.environ['APPLE_API_KEY']}.p8")
          key_path.write_bytes(base64.b64decode(os.environ["APPLE_API_PRIVATE_KEY"]))
          print(f"APPLE_API_KEY_PATH={key_path.resolve()}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"APPLE_API_KEY_PATH={key_path.resolve()}\n")
          PY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          key: tauri-${{ matrix.os }}-${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2" --force

      - name: Build Tauri app
        working-directory: src-tauri
        run: |
          rm -rf target/${{ matrix.target }}/release/bundle
          cargo tauri build --target ${{ matrix.target }}

      - name: Upload Linux packages
        if: matrix.os == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS ARM package
        if: matrix.os == 'macos-latest' && matrix.target == 'aarch64-apple-darwin'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS Intel package
        if: matrix.os == 'macos-latest' && matrix.target == 'x86_64-apple-darwin'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
