name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_ARTIFACT_NAME: csv-align-linux-x86_64-release-bundle
  FRONTEND_DIST_ARTIFACT_NAME: csv-align-frontend-dist

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-22.04
    outputs:
      ci_run_id: ${{ steps.wait_for_ci.outputs.ci_run_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate release metadata
        run: python3 scripts/check_release_metadata.py --expected-tag "${{ github.ref_name }}"

      - name: Wait for CI on tagged commit
        id: wait_for_ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAGGED_SHA: ${{ github.sha }}
          RELEASE_ARTIFACT_NAME: ${{ env.RELEASE_ARTIFACT_NAME }}
          FRONTEND_DIST_ARTIFACT_NAME: ${{ env.FRONTEND_DIST_ARTIFACT_NAME }}
        run: |
          deadline=$((SECONDS + 3600))

          while [ "$SECONDS" -lt "$deadline" ]; do
            run_json="$(gh api "repos/${REPOSITORY}/actions/runs?head_sha=${TAGGED_SHA}&event=push&per_page=20")"
            run_state="$(printf '%s' "$run_json" | python3 -c "import json, sys; runs = json.load(sys.stdin).get('workflow_runs', []); match = next((run for run in runs if run.get('name') == 'CI' and run.get('head_branch') == 'main'), None); print('' if match is None else f\"{match.get('id', '')}\\t{match.get('status', '')}\\t{match.get('conclusion') or ''}\\t{match.get('html_url', '')}\")")"

            run_id="${run_state%%$'\t'*}"
            remainder="${run_state#*$'\t'}"
            status="${remainder%%$'\t'*}"
            remainder="${remainder#*$'\t'}"
            conclusion="${remainder%%$'\t'*}"
            run_url="${remainder#*$'\t'}"

            if [ -z "$run_state" ]; then
              echo "Waiting for CI run for commit ${TAGGED_SHA} to appear..."
              sleep 20
              continue
            fi

            echo "Observed CI run status: ${status:-unknown} ${conclusion:-}"

            if [ "$status" = "completed" ] && [ "$conclusion" = "success" ]; then
              for artifact_name in "$RELEASE_ARTIFACT_NAME" "$FRONTEND_DIST_ARTIFACT_NAME"; do
                artifact_count="$(gh api "repos/${REPOSITORY}/actions/runs/${run_id}/artifacts?name=${artifact_name}" --jq '[.artifacts[] | select(.expired == false)] | length')"
                if [ "$artifact_count" -eq 0 ]; then
                  echo "CI succeeded for ${TAGGED_SHA} but did not publish a non-expired artifact named ${artifact_name}." >&2
                  exit 1
                fi
              done

              echo "ci_run_id=${run_id}" >> "$GITHUB_OUTPUT"
              echo "CI succeeded for ${TAGGED_SHA}: ${run_url}"
              exit 0
            fi

            if [ "$status" = "completed" ]; then
              echo "CI did not succeed for ${TAGGED_SHA}: ${run_url}" >&2
              exit 1
            fi

            sleep 20
          done

          echo "Timed out waiting for CI to finish for ${TAGGED_SHA}." >&2
          exit 1

  create-release:
    name: Create Release
    needs: validate-release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract changelog notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 <<'PY'
          import os
          import pathlib
          import re
          import sys

          tag = os.environ["RELEASE_TAG"]
          changelog_path = pathlib.Path("CHANGELOG.md")
          release_notes_path = pathlib.Path("release-notes.md")
          heading_pattern = re.compile(r"^## (?P<tag>v[^\s]+) - \d{4}-\d{2}-\d{2}$")

          if not changelog_path.exists():
              print(
                  "::error title=Missing changelog::CHANGELOG.md was not found in the repository checkout.",
                  file=sys.stderr,
              )
              sys.exit(1)

          section_lines = []
          in_target_section = False

          for raw_line in changelog_path.read_text(encoding="utf-8").splitlines():
              heading_match = heading_pattern.match(raw_line)
              if heading_match:
                  if in_target_section:
                      break
                  in_target_section = heading_match.group("tag") == tag
                  continue

              if in_target_section:
                  section_lines.append(raw_line)

          if not in_target_section:
              print(
                  f"::error title=Missing changelog entry::No CHANGELOG.md section found for tag {tag}. Expected a heading like `## {tag} - YYYY-MM-DD`.",
                  file=sys.stderr,
              )
              sys.exit(1)

          notes = "\n".join(section_lines).strip()
          if not notes:
              print(
                  f"::error title=Empty changelog entry::CHANGELOG.md section for tag {tag} is empty. Add at least one release note bullet under the heading.",
                  file=sys.stderr,
              )
              sys.exit(1)

          release_notes_path.write_text(f"{notes}\n", encoding="utf-8")
          PY

      - name: Check if release already exists
        id: release_exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh existing release as draft
        if: steps.release_exists.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "CSV Align ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            --draft=true \
            --prerelease=false

      - name: Create GitHub Release
        if: steps.release_exists.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: CSV Align ${{ github.ref_name }}
          draft: true
          prerelease: false
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Publish Release Assets
    needs: [validate-release, create-release]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download reusable Tauri bundle artifact from CI
        uses: actions/download-artifact@v6
        with:
          name: ${{ env.RELEASE_ARTIFACT_NAME }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.validate-release.outputs.ci_run_id }}
          path: release-artifacts

      - name: Inspect downloaded release artifacts
        run: ls -R release-artifacts

      - name: Install Debian signature and metadata validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-sig gnupg appstream desktop-file-utils

      - name: Verify Debian package signatures
        env:
          DEB_SIGNING_PUBLIC_KEY: ${{ vars.DEB_SIGNING_PUBLIC_KEY }}
          DEB_SIGNING_KEY_FINGERPRINT: ${{ secrets.DEB_SIGNING_KEY_FINGERPRINT }}
        run: |
          set -euo pipefail

          missing=()
          [ -n "${DEB_SIGNING_PUBLIC_KEY}" ] || missing+=("DEB_SIGNING_PUBLIC_KEY repository variable")
          [ -n "${DEB_SIGNING_KEY_FINGERPRINT}" ] || missing+=("DEB_SIGNING_KEY_FINGERPRINT")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required Debian signature verification inputs are missing: ${missing[*]}" >&2
            exit 1
          fi

          shopt -s globstar nullglob
          deb_packages=(release-artifacts/**/*.deb)

          if [ ${#deb_packages[@]} -eq 0 ]; then
            echo "No Debian packages found under release-artifacts." >&2
            exit 1
          fi

          gnupg_home="$(mktemp -d)"
          verification_home="$(mktemp -d)"
          public_key_file="$(mktemp)"
          expected_public_key_file=""
          safe_deb_file=""
          cleanup() {
            rm -rf "${gnupg_home}"
            rm -rf "${verification_home}"
            rm -f "${public_key_file}"
            if [ -n "${expected_public_key_file}" ]; then
              rm -f "${expected_public_key_file}"
            fi
            if [ -n "${safe_deb_file}" ]; then
              rm -f "${safe_deb_file}"
            fi
          }
          trap cleanup EXIT

          chmod 700 "${gnupg_home}"
          export GNUPGHOME="${gnupg_home}"

          printf '%s' "${DEB_SIGNING_PUBLIC_KEY}" | base64 --decode > "${public_key_file}"
          gpg --batch --import "${public_key_file}"

          expected_fingerprint="$(printf '%s' "${DEB_SIGNING_KEY_FINGERPRINT}" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          imported_fingerprint="$(gpg --batch --with-colons --fingerprint "${expected_fingerprint}" | awk -F: '$1 == "fpr" { print toupper($10); exit }')"

          if [ "${imported_fingerprint}" != "${expected_fingerprint}" ]; then
            echo "Imported Debian signing public key fingerprint did not match DEB_SIGNING_KEY_FINGERPRINT." >&2
            exit 1
          fi

          expected_public_key_file="$(mktemp)"
          gpg --batch --armor --export "${expected_fingerprint}" > "${expected_public_key_file}"
          chmod 700 "${verification_home}"
          GNUPGHOME="${verification_home}" gpg --batch --import "${expected_public_key_file}"

          for deb in "${deb_packages[@]}"; do
            echo "Verifying ${deb}"
            deb_basename="$(basename "${deb}")"
            safe_basename="$(printf '%s' "${deb_basename}" | tr ' ' '_' | tr -cd '[:alnum:]_.-')"
            safe_deb_file="${RUNNER_TEMP:-/tmp}/${safe_basename}"
            if [ -e "${safe_deb_file}" ]; then
              safe_deb_file="${RUNNER_TEMP:-/tmp}/verify-${RANDOM}-${safe_basename}"
            fi
            cp "${deb}" "${safe_deb_file}"
            GNUPGHOME="${verification_home}" dpkg-sig --verify-role builder "${safe_deb_file}"
            rm -f "${safe_deb_file}"
            safe_deb_file=""
          done

      - name: Validate Debian package metadata
        env:
          DEB_METADATA_REPORT: deb-metadata-report.json
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          deb_packages=(release-artifacts/**/*.deb)
          if [ ${#deb_packages[@]} -eq 0 ]; then
            echo "No Debian packages found under release-artifacts." >&2
            exit 1
          fi

          set +e
          python3 scripts/validate_linux_deb_metadata.py \
            "${deb_packages[@]}" \
            --json-report "${DEB_METADATA_REPORT}"
          validator_status=$?
          set -e

          python3 <<'PY'
          import json
          import os
          import pathlib

          report_path = pathlib.Path(os.environ["DEB_METADATA_REPORT"])
          report = json.loads(report_path.read_text(encoding="utf-8"))
          lines = [
              "## Debian package metadata validation",
              "",
              f"Gate: {'PASS' if report['ok'] else 'FAIL'}",
              "",
              "| Package | Component ID | Project license | Desktop ID | Binary |",
              "| --- | --- | --- | --- | --- |",
          ]
          for package in report["packages"]:
              lines.append(
                  "| {package} | {component_id} | {project_license} | {launchable} | {binary} |".format(
                      package=pathlib.Path(package["package"]).name,
                      component_id=package.get("component_id") or "",
                      project_license=package.get("project_license") or "",
                      launchable=package.get("launchable") or "",
                      binary=package.get("binary") or "",
                  )
              )
          lines.extend(["", f"JSON report: `{report_path}`"])
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("\n".join(lines) + "\n")
          PY

          exit "${validator_status}"

      - name: Build signed APT repository
        env:
          APT_REPO_SIGNING_PRIVATE_KEY: ${{ secrets.APT_REPO_SIGNING_PRIVATE_KEY }}
          APT_REPO_SIGNING_KEY_FINGERPRINT: ${{ secrets.APT_REPO_SIGNING_KEY_FINGERPRINT }}
          APT_REPO_SIGNING_KEY_PASSPHRASE: ${{ secrets.APT_REPO_SIGNING_KEY_PASSPHRASE }}
          DEB_SIGNING_PRIVATE_KEY: ${{ secrets.DEB_SIGNING_PRIVATE_KEY }}
          DEB_SIGNING_KEY_FINGERPRINT: ${{ secrets.DEB_SIGNING_KEY_FINGERPRINT }}
          DEB_SIGNING_KEY_PASSPHRASE: ${{ secrets.DEB_SIGNING_KEY_PASSPHRASE }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          signing_private_key="${APT_REPO_SIGNING_PRIVATE_KEY}"
          signing_fingerprint="${APT_REPO_SIGNING_KEY_FINGERPRINT}"
          signing_passphrase="${APT_REPO_SIGNING_KEY_PASSPHRASE}"
          signing_source="APT repository signing key"

          if [ -z "${signing_private_key}" ] && [ -z "${signing_fingerprint}" ]; then
            signing_private_key="${DEB_SIGNING_PRIVATE_KEY}"
            signing_fingerprint="${DEB_SIGNING_KEY_FINGERPRINT}"
            signing_passphrase="${DEB_SIGNING_KEY_PASSPHRASE}"
            signing_source="Debian package signing key fallback"
          fi

          missing=()
          [ -n "${signing_private_key}" ] || missing+=("APT_REPO_SIGNING_PRIVATE_KEY or DEB_SIGNING_PRIVATE_KEY")
          [ -n "${signing_fingerprint}" ] || missing+=("APT_REPO_SIGNING_KEY_FINGERPRINT or DEB_SIGNING_KEY_FINGERPRINT")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required APT repository signing inputs are missing: ${missing[*]}" >&2
            exit 1
          fi
          echo "Using ${signing_source} for APT repository Release signing."

          deb_packages=(release-artifacts/**/*.deb)
          if [ ${#deb_packages[@]} -eq 0 ]; then
            echo "No Debian packages found under release-artifacts." >&2
            exit 1
          fi

          gnupg_home="$(mktemp -d)"
          verification_home="$(mktemp -d)"
          key_file="$(mktemp)"
          passphrase_file=""
          setup_extract_dir=""
          cleanup() {
            rm -rf "${gnupg_home}"
            rm -rf "${verification_home}"
            rm -f "${key_file}"
            if [ -n "${passphrase_file}" ]; then
              rm -f "${passphrase_file}"
            fi
            if [ -n "${setup_extract_dir}" ]; then
              rm -rf "${setup_extract_dir}"
            fi
          }
          trap cleanup EXIT

          chmod 700 "${gnupg_home}"
          export GNUPGHOME="${gnupg_home}"
          echo allow-loopback-pinentry > "${GNUPGHOME}/gpg-agent.conf"
          gpgconf --kill gpg-agent || true

          printf '%s' "${signing_private_key}" | base64 --decode > "${key_file}"
          gpg --batch --import "${key_file}"

          expected_fingerprint="$(printf '%s' "${signing_fingerprint}" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          imported_fingerprint="$(gpg --batch --with-colons --fingerprint "${expected_fingerprint}" | awk -F: '$1 == "fpr" { print toupper($10); exit }')"

          if [ "${imported_fingerprint}" != "${expected_fingerprint}" ]; then
            echo "Imported APT repository signing key fingerprint did not match the selected signing fingerprint." >&2
            exit 1
          fi

          passphrase_args=()
          if [ -n "${signing_passphrase}" ]; then
            passphrase_file="$(mktemp)"
            chmod 600 "${passphrase_file}"
            printf '%s' "${signing_passphrase}" > "${passphrase_file}"
            passphrase_args=(--gpg-passphrase-file "${passphrase_file}")
          else
            echo "Selected APT repository signing passphrase is not set; signing will only work for an intentionally unprotected key."
          fi

          setup_package="csv-align-repository-setup_1.0_all.deb"
          python3 scripts/build_apt_repository.py \
            --clean \
            --output apt-repository \
            --suite stable \
            --repository-url "https://ddv1982.github.io/csv-align/apt/" \
            --gpg-homedir "${gnupg_home}" \
            --gpg-key "${expected_fingerprint}" \
            --public-key-out apt-repository/csv-align-archive-keyring.pgp \
            --setup-package-out "${setup_package}" \
            "${passphrase_args[@]}" \
            "${deb_packages[@]}"

          test "$(dpkg-deb --field "${setup_package}" Package)" = "csv-align-repository-setup"
          test "$(dpkg-deb --field "${setup_package}" Version)" = "1.0"
          test "$(dpkg-deb --field "${setup_package}" Architecture)" = "all"
          setup_extract_dir="$(mktemp -d)"
          dpkg-deb -x "${setup_package}" "${setup_extract_dir}"
          test -s "${setup_extract_dir}/usr/share/keyrings/csv-align-archive-keyring.pgp"
          grep -Fx "Types: deb" "${setup_extract_dir}/etc/apt/sources.list.d/csv-align.sources"
          grep -Fx "URIs: https://ddv1982.github.io/csv-align/apt/" "${setup_extract_dir}/etc/apt/sources.list.d/csv-align.sources"
          grep -Fx "Suites: stable" "${setup_extract_dir}/etc/apt/sources.list.d/csv-align.sources"
          grep -Fx "Components: main" "${setup_extract_dir}/etc/apt/sources.list.d/csv-align.sources"
          grep -E '^Architectures: .*amd64( |$)' "${setup_extract_dir}/etc/apt/sources.list.d/csv-align.sources"
          grep -Fx "Signed-By: /usr/share/keyrings/csv-align-archive-keyring.pgp" "${setup_extract_dir}/etc/apt/sources.list.d/csv-align.sources"

          chmod 700 "${verification_home}"
          GNUPGHOME="${verification_home}" gpg --batch --import apt-repository/csv-align-archive-keyring.pgp
          GNUPGHOME="${verification_home}" gpg --batch --verify apt-repository/dists/stable/InRelease
          GNUPGHOME="${verification_home}" gpg --batch --verify \
            apt-repository/dists/stable/Release.gpg \
            apt-repository/dists/stable/Release

          tar -C apt-repository -czf "csv-align-apt-repository-${RELEASE_TAG}.tar.gz" .
          mkdir -p pages-site/apt
          cp -a apt-repository/. pages-site/apt/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload APT repository Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-site

      - name: Deploy APT repository to GitHub Pages
        id: deploy_apt_pages
        uses: actions/deploy-pages@v4

      - name: Upload Linux packages
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/**/*.deb
            release-artifacts/**/*.AppImage
            csv-align-apt-repository-*.tar.gz
            csv-align-repository-setup_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-release:
    name: Publish macOS Release Assets
    needs: [validate-release, create-release]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Prepare Apple signing environment
        env:
          APPLE_CERTIFICATE_SECRET: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY_SECRET: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          KEYCHAIN_PASSWORD_SECRET: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=()
          [ -n "$APPLE_CERTIFICATE_SECRET" ] || missing+=("APPLE_CERTIFICATE")
          [ -n "$APPLE_CERTIFICATE_PASSWORD_SECRET" ] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [ -n "$KEYCHAIN_PASSWORD_SECRET" ] || missing+=("KEYCHAIN_PASSWORD")
          [ -n "$APPLE_API_ISSUER_SECRET" ] || missing+=("APPLE_API_ISSUER")
          [ -n "$APPLE_API_KEY_SECRET" ] || missing+=("APPLE_API_KEY")
          [ -n "$APPLE_API_PRIVATE_KEY_SECRET" ] || missing+=("APPLE_API_PRIVATE_KEY")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required macOS release secrets are missing: ${missing[*]}" >&2
            echo "Configure App Store Connect API key authentication; Apple ID/app-specific-password notarization is not supported by this workflow." >&2
            exit 1
          fi

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          python3 <<'PY'
          import base64
          import os
          import pathlib

          pathlib.Path("certificate.p12").write_bytes(
              base64.b64decode(os.environ["APPLE_CERTIFICATE"])
          )
          PY
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain /Library/Keychains/System.keychain /System/Library/Keychains/SystemRootCertificates.keychain
          CERT_ID=$(security find-identity -v -p codesigning | awk -F '"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$CERT_ID" ]; then
            echo "No Developer ID Application signing identity was imported." >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          rm -f certificate.p12

      - name: Prepare App Store Connect API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          python3 <<'PY'
          import base64
          import os
          import pathlib

          key_path = pathlib.Path(f"AuthKey_{os.environ['APPLE_API_KEY']}.p8")
          key_path.write_bytes(base64.b64decode(os.environ["APPLE_API_PRIVATE_KEY"]))
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"APPLE_API_KEY_PATH={key_path.resolve()}\n")
          PY

      - name: Download frontend dist artifact from CI
        uses: actions/download-artifact@v6
        with:
          name: ${{ env.FRONTEND_DIST_ARTIFACT_NAME }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.validate-release.outputs.ci_run_id }}
          path: frontend/dist

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          key: tauri-release-${{ runner.os }}-${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"

      - name: Build Tauri app
        working-directory: src-tauri
        env:
          CSV_ALIGN_USE_PREBUILT_FRONTEND: '1'
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          rm -rf target/${{ matrix.target }}/release/bundle
          cargo tauri build --target ${{ matrix.target }}

      - name: Upload macOS package
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    needs: [create-release, build-release, build-macos-release]
    runs-on: ubuntu-22.04

    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --prerelease=false
