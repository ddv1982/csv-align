name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate release metadata
        run: python3 scripts/check_release_metadata.py --expected-tag "${{ github.ref_name }}"

      - name: Wait for CI on tagged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAGGED_SHA: ${{ github.sha }}
        run: |
          deadline=$((SECONDS + 1800))

          while [ "$SECONDS" -lt "$deadline" ]; do
            run_json="$(gh api "repos/${REPOSITORY}/actions/runs?head_sha=${TAGGED_SHA}&event=push&per_page=20")"
            run_state="$(printf '%s' "$run_json" | python3 -c "import json, sys; runs = json.load(sys.stdin).get('workflow_runs', []); match = next((run for run in runs if run.get('name') == 'CI' and run.get('head_branch') == 'main'), None); print('' if match is None else f\"{match.get('status', '')}\\t{match.get('conclusion') or ''}\\t{match.get('html_url', '')}\")")"

            status="${run_state%%$'\t'*}"
            remainder="${run_state#*$'\t'}"
            conclusion="${remainder%%$'\t'*}"
            run_url="${remainder#*$'\t'}"

            if [ -z "$run_state" ]; then
              echo "Waiting for CI run for commit ${TAGGED_SHA} to appear..."
              sleep 20
              continue
            fi

            echo "Observed CI run status: ${status:-unknown} ${conclusion:-}"

            if [ "$status" = "completed" ] && [ "$conclusion" = "success" ]; then
              echo "CI succeeded for ${TAGGED_SHA}: ${run_url}"
              exit 0
            fi

            if [ "$status" = "completed" ]; then
              echo "CI did not succeed for ${TAGGED_SHA}: ${run_url}" >&2
              exit 1
            fi

            sleep 20
          done

          echo "Timed out waiting for CI to finish for ${TAGGED_SHA}." >&2
          exit 1

  create-release:
    name: Create Release
    needs: validate-release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract changelog notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 <<'PY'
          import os
          import pathlib
          import re
          import sys

          tag = os.environ["RELEASE_TAG"]
          changelog_path = pathlib.Path("CHANGELOG.md")
          release_notes_path = pathlib.Path("release-notes.md")
          heading_pattern = re.compile(r"^## (?P<tag>v[^\s]+) - \d{4}-\d{2}-\d{2}$")

          if not changelog_path.exists():
              print(
                  "::error title=Missing changelog::CHANGELOG.md was not found in the repository checkout.",
                  file=sys.stderr,
              )
              sys.exit(1)

          section_lines = []
          in_target_section = False

          for raw_line in changelog_path.read_text(encoding="utf-8").splitlines():
              heading_match = heading_pattern.match(raw_line)
              if heading_match:
                  if in_target_section:
                      break
                  in_target_section = heading_match.group("tag") == tag
                  continue

              if in_target_section:
                  section_lines.append(raw_line)

          if not in_target_section:
              print(
                  f"::error title=Missing changelog entry::No CHANGELOG.md section found for tag {tag}. Expected a heading like `## {tag} - YYYY-MM-DD`.",
                  file=sys.stderr,
              )
              sys.exit(1)

          notes = "\n".join(section_lines).strip()
          if not notes:
              print(
                  f"::error title=Empty changelog entry::CHANGELOG.md section for tag {tag} is empty. Add at least one release note bullet under the heading.",
                  file=sys.stderr,
              )
              sys.exit(1)

          release_notes_path.write_text(f"{notes}\n", encoding="utf-8")
          PY

      - name: Check if release already exists
        id: release_exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh existing release as draft
        if: steps.release_exists.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --title "CSV Align ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            --draft=true \
            --prerelease=false

      - name: Create GitHub Release
        if: steps.release_exists.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: CSV Align ${{ github.ref_name }}
          draft: true
          prerelease: false
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build Release
    needs: [validate-release, create-release]
    runs-on: ubuntu-22.04
    env:
      TAURI_TARGET: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space (Ubuntu)
        run: |
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          echo "Disk usage after cleanup:"
          df -h

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TAURI_TARGET }}

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          key: release-build-${{ runner.os }}-${{ env.TAURI_TARGET }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"

      - name: Build Tauri app
        working-directory: src-tauri
        run: |
          rm -rf target/${{ env.TAURI_TARGET }}/release/bundle
          cargo tauri build --target ${{ env.TAURI_TARGET }}

      - name: Upload Linux packages
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    needs: [create-release, build-release]
    runs-on: ubuntu-22.04

    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --prerelease=false
